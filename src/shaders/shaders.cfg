// Generic ShaderMake config: add more shaders here over time
// Format: <path/to/shader> -T <profile> -E <entry> [-m shaderModel]

imgui.hlsl -T vs -E VSMain -m 6_8
imgui.hlsl -T ps -E PSMain -m 6_8
BasePass.hlsl -T vs -E VSMain -m 6_8
BasePass.hlsl -T ps -E GBuffer_PSMain -m 6_8
BasePass.hlsl -T ps -E GBuffer_PSMain_AlphaTest -m 6_8 -D ALPHA_TEST=1 -s _AlphaTest
BasePass.hlsl -T ps -E Forward_PSMain -m 6_8 -D FORWARD_TRANSPARENT=1 -s _Forward_Transparent
BasePass.hlsl -T ms -E MSMain -m 6_8
BasePass.hlsl -T as -E ASMain -m 6_8
GPUCulling.hlsl -T cs -E Culling_CSMain -m 6_8
GPUCulling.hlsl -T cs -E BuildIndirect_CSMain -m 6_8
ResizeToNextLowestPowerOfTwo.hlsl -T cs -E CS_ResizeToNextLowestPowerOfTwo -m 6_8 -D NUM_CHANNELS={1,3}
SPD.hlsl -T cs -E SPD_CSMain -m 6_8 -D SPD_NUM_CHANNELS={1,3}
LuminanceHistogram.hlsl -T cs -E LuminanceHistogram_CSMain -m 6_8
ExposureAdaptation.hlsl -T cs -E ExposureAdaptation_CSMain -m 6_8
Tonemap.hlsl -T ps -E Tonemap_PSMain -m 6_8
DepthCopy.hlsl -T ps -E DepthCopy_PSMain -m 6_8
Bloom.hlsl -T ps -E Prefilter_PSMain -m 6_8
Bloom.hlsl -T ps -E Downsample_PSMain -m 6_8
Bloom.hlsl -T ps -E Upsample_PSMain -m 6_8
FullScreen.hlsl -T ms -E MSMain -m 6_8
DeferredLighting.hlsl -T ps -E DeferredLighting_PSMain -m 6_8
Sky.hlsl -T ps -E Sky_PSMain -m 6_8
PathTracer.hlsl -T cs -E PathTracer_CSMain -m 6_8 -D PATH_TRACER_MODE=1
TLASPatch.hlsl -T cs -E TLASPatch_CSMain -m 6_8

rtxdi/CompositingPass.hlsl -T ps -E CompositingPass_PSMain
rtxdi/PostprocessGBuffer.hlsl -T cs -E main
rtxdi/ShaderDebug/PackedDataVizPasses/NDirOctUNorm32Viz.hlsl -T cs -E main
rtxdi/ShaderDebug/PackedDataVizPasses/PackedR8G8B8A8GammaUFloatViz.hlsl -T cs -E main
rtxdi/ShaderDebug/PackedDataVizPasses/PackedR11G11B10UFloatViz.hlsl -T cs -E main
rtxdi/ShaderDebug/PackedDataVizPasses/DuplicationMapViz.hlsl -T cs -E main
rtxdi/ShaderDebug/PackedDataVizPasses/SampleIDViz.hlsl -T cs -E main
rtxdi/ShaderDebug/PTPathViz/PTPathVizPreprocess_cs.hlsl -T cs -E main
rtxdi/ShaderDebug/PTPathViz/PTPathVizLines_vs.hlsl -T vs -E vs_main
rtxdi/ShaderDebug/PTPathViz/PTPathVizLines_ps.hlsl -T ps -E ps_main
rtxdi/ShaderDebug/ReservoirSubfieldVizPasses/DIReservoirViz.hlsl -T cs -E main
rtxdi/ShaderDebug/ReservoirSubfieldVizPasses/GIReservoirViz.hlsl -T cs -E main
rtxdi/ShaderDebug/ReservoirSubfieldVizPasses/PTReservoirViz.hlsl -T cs -E main
rtxdi/ShaderDebug/VisualizeHdrSignals.hlsl -T ps -E main
rtxdi/ShaderDebug/VisualizeConfidence.hlsl -T ps -E main

rtxdi/PrepareLights.hlsl -T cs -E main
rtxdi/LightingPasses/Presampling/PresampleLights.hlsl -T cs -E main
rtxdi/LightingPasses/Presampling/PresampleReGIR.hlsl -T cs -E main -D RTXDI_REGIR_MODE={RTXDI_REGIR_GRID,RTXDI_REGIR_ONION}
rtxdi/LightingPasses/DI/GenerateInitialSamples.hlsl -T cs -E main -D RTXDI_REGIR_MODE={RTXDI_REGIR_DISABLED,RTXDI_REGIR_GRID,RTXDI_REGIR_ONION}
rtxdi/LightingPasses/DI/TemporalResampling.hlsl -T cs -E main
rtxdi/LightingPasses/DI/SpatialResampling.hlsl -T cs -E main
rtxdi/LightingPasses/DI/ShadeSamples.hlsl -T cs -E main -D RTXDI_REGIR_MODE={RTXDI_REGIR_DISABLED,RTXDI_REGIR_GRID,RTXDI_REGIR_ONION}

rtxdi/LightingPasses/BrdfRayTracing.hlsl -T cs -E main
rtxdi/LightingPasses/ShadeSecondarySurfaces.hlsl -T cs -E main -D RTXDI_REGIR_MODE={RTXDI_REGIR_DISABLED,RTXDI_REGIR_GRID,RTXDI_REGIR_ONION}

rtxdi/LightingPasses/GI/TemporalResampling.hlsl -T cs -E main
rtxdi/LightingPasses/GI/SpatialResampling.hlsl -T cs -E main
rtxdi/LightingPasses/GI/FinalShading.hlsl -T cs -E main

// NOTE: dont compile PT shaders for now, because i dont have them
// 'GenerateInitialSamples', 'TemporalResampling' & 'SpatialResampling' crashes when trying to compile it
// without `-enable-16bit-types`, `uint16_t` is unknown. **With** `-enable-16bit-types`, `uint16_t` is a native type but the DXC crashes with `llvm::cast<X>()`
// This is a known DXC bug when using `uint16_t` in certain struct contexts with shader model 6.8.
// DXC 1.9.2602.17. The `llvm::cast<X>()` crash with `uint16_t` in structs is a known DXC bug

